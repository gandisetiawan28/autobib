<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBib Control Panel</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --danger: #ef4444;
            --success: #10b981;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
        }

        /* Title Bar Drag Region */
        .titlebar {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 32px;
            -webkit-app-region: drag;
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            margin-top: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 16px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--danger);
            box-shadow: 0 0 10px var(--danger);
            transition: all 0.3s ease;
        }

        .dot.active {
            background-color: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        button {
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 8px -1px rgba(99, 102, 241, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .btn-danger {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .btn-danger:hover {
            background-color: rgba(239, 68, 68, 0.2);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .console {
            margin-top: 24px;
            background-color: #000;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            color: #10b981;
            height: 120px;
            overflow-y: auto;
            border: 1px solid var(--border);
            -webkit-user-select: text;
            user-select: text;
        }

        .console-line {
            margin-bottom: 4px;
            line-height: 1.4;
            word-break: break-all;
        }

        .console-line.error {
            color: var(--danger);
        }
        
        .console-line.info {
            color: #3b82f6;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        
        .loader {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid #FFF;
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="titlebar">AutoBib Server Manager</div>
    
    <div class="container">
        <div class="header">
            <h1>AutoBib Control Panel</h1>
            <p>Smart Engine & Background Services</p>
        </div>

        <div class="card">
            <div class="status-bar">
                <div class="status-indicator">
                    <div class="dot" id="statusDot"></div>
                    <span id="statusText">Server Offline</span>
                </div>
            </div>

            <div class="btn-group">
                <button id="btnStart" class="btn-primary">
                    <span class="loader" id="startLoader"></span>
                    <span id="btnStartText">Start Engine</span>
                </button>
                <button id="btnStop" class="btn-danger" style="display: none;">
                    Stop Engine
                </button>
                <button id="btnSetup" class="btn-secondary">
                    <span class="loader" id="setupLoader"></span>
                    <span id="btnSetupText">Install & Setup Dependencies</span>
                </button>
            </div>
            
            <div class="console" id="consoleOutput">
                <div class="console-line info">System ready. Waiting for command...</div>
            </div>
        </div>

        <div class="card" style="margin-top: 20px;">
            <h2 style="font-size: 18px; margin-bottom: 16px; color: var(--text-main);">Settings</h2>
            
            <div style="margin-bottom: 16px;">
                <label style="display: block; font-size: 14px; margin-bottom: 8px; color: var(--text-muted);">Mendeley Client ID</label>
                <input type="text" id="mendeleyClientId" placeholder="e.g. 12345" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background-color: rgba(255, 255, 255, 0.05); color: white; font-family: 'Segoe UI'; font-size: 14px;">
            </div>

            <div style="margin-bottom: 24px;">
                <label style="display: block; font-size: 14px; margin-bottom: 8px; color: var(--text-muted);">Mendeley Client Secret</label>
                <input type="password" id="mendeleyClientSecret" placeholder="Your Client Secret" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background-color: rgba(255, 255, 255, 0.05); color: white; font-family: 'Segoe UI'; font-size: 14px;">
            </div>

            <button id="btnSaveConfig" class="btn-secondary" style="padding: 12px 16px; font-size: 14px;">
                Save Settings
            </button>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
